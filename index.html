<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyQuest Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'studywithz';

        // Состояние игры
        let state = {
            coins: 0,
            level: 1,
            xp: 0,
            tasks: [],
            shopItems: [
                { name: "🍫 Шоколадка", price: 50 },
                { name: "🎬 Серия сериала", price: 100 }
            ]
        };

        let user = null;

        // Авторизация
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('user-id-display').innerText = u.uid;
                loadData();
            } else {
                await signInAnonymously(auth);
            }
        });

        // Загрузка и синхронизация
        async function loadData() {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'progression');
            
            // Слушаем изменения в реальном времени
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    state = { ...state, ...docSnap.data() };
                    updateUI();
                } else {
                    saveData(); // Создаем начальный профиль
                }
            }, (error) => console.error("Ошибка базы:", error));
        }

        async function saveData() {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'progression');
            await setDoc(docRef, state);
        }

        // Интерфейс
        function updateUI() {
            document.getElementById('coin-count').innerText = state.coins;
            document.getElementById('level-display').innerText = state.level;
            document.getElementById('xp-bar').style.width = state.xp + '%';
            renderTasks();
            renderShop();
        }

        function renderTasks() {
            const container = document.getElementById('task-container');
            container.innerHTML = '';
            state.tasks.forEach((task, index) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 bg-slate-800/40 rounded-2xl border border-slate-700/50 mb-3";
                div.innerHTML = `
                    <div>
                        <p class="font-semibold text-sm">${task.name}</p>
                        <p class="text-[10px] text-slate-500">📅 ${task.date || 'Без срока'}</p>
                    </div>
                    <button onclick="finishTask(${index})" class="bg-emerald-500/20 text-emerald-400 px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-500 hover:text-white transition">Готово</button>
                `;
                container.appendChild(div);
            });
        }

        function renderShop() {
            const container = document.getElementById('shop-items');
            container.innerHTML = '';
            state.shopItems.forEach((item) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-3 bg-slate-800/30 rounded-xl border border-slate-700/30 mb-2";div.innerHTML = `
                    <span class="text-sm">${item.name}</span>
                    <button onclick="buy(${item.price})" class="bg-yellow-600/20 text-yellow-500 px-3 py-1 rounded-lg text-xs font-bold hover:bg-yellow-600 hover:text-white transition">${item.price} 🪙</button>
                `;
                container.appendChild(div);
            });
        }

        // Делаем функции доступными глобально
        window.createTask = () => {
            const name = document.getElementById('task-name').value;
            const date = document.getElementById('task-date').value;
            if(!name) return;
            state.tasks.push({ name, date });
            document.getElementById('task-name').value = '';
            saveData();
        };

        window.finishTask = (index) => {
            state.tasks.splice(index, 1);
            state.coins += 10;
            state.xp += 25;
            if(state.xp >= 100) { state.level++; state.xp = 0; }
            saveData();
        };

        window.buy = (price) => {
            if(state.coins >= price) {
                state.coins -= price;
                saveData();
                alert("Куплено!");
            } else {
                alert("Мало монет!");
            }
        };

        window.copyId = () => {
            const id = document.getElementById('user-id-display').innerText;
            const el = document.createElement('textarea');
            el.value = id;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Твой ID скопирован! Сохрани его, чтобы не потерять прогресс.");
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        h1, h2, h3 { font-family: 'Unbounded', cursive; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <!-- Шапка -->
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[10px] text-slate-400 uppercase">Золото</p>
                <p class="text-2xl font-bold text-yellow-400">🪙 <span id="coin-count">0</span></p>
            </div>
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[10px] text-slate-400 uppercase">Уровень</p>
                <p class="text-2xl font-bold text-blue-400 text-center">⭐ <span id="level-display">1</span></p>
                <div class="w-full bg-slate-800 h-1 mt-1 rounded-full"><div id="xp-bar" class="bg-blue-500 h-full w-0 transition-all"></div></div>
            </div>
            <div class="glass p-4 rounded-3xl text-center col-span-2 md:col-span-1">
                <p class="text-[10px] text-slate-400 uppercase">Твой Облачный ID</p>
                <p id="user-id-display" class="text-[9px] font-mono text-slate-500 truncate mt-1">Загрузка...</p>
                <button onclick="copyId()" class="text-[10px] text-blue-400 underline">Скопировать ID</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <section class="glass p-6 rounded-[2rem]">
                    <h2 class="text-lg mb-4">📜 Квесты</h2>
                    <div id="task-container"></div>
                    <div class="mt-6 flex flex-col gap-2">
                        <input type="text" id="task-name" placeholder="Новая задача" class="bg-slate-800 p-3 rounded-xl outline-none text-sm">
                        <input type="date" id="task-date" class="bg-slate-800 p-3 rounded-xl outline-none text-sm"><button onclick="createTask()" class="bg-blue-600 p-3 rounded-xl font-bold text-sm">Добавить</button>
                    </div>
                </section>
            </div>
            <section class="glass p-6 rounded-[2rem] h-fit">
                <h2 class="text-lg mb-4">🛒 Лавка</h2>
                <div id="shop-items"></div>
            </section>
        </div>
    </div>
</body>
</html>
